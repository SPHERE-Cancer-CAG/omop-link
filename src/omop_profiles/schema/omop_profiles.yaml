id: https://athena.ohdsi.org/search-terms/terms/omop_profiles
name: omop_profiles
title: OMOP Profiles
description: >
  LinkML schema for defining the set of profiles, or 'shapes' of data that can be 
  validly populated with clinical endpoints in the OMOP CDM. 
  This is intended to be used for defining the permissible semantic structures that 
  can be used to populate the CDM, such as EAV form, or direct concept identifier slots. 

imports:
  - omop_semantic_base
  - omop_named_sets
  - omop_templates

prefixes:
  linkml: https://w3id.org/linkml/
  omop: https://athena.ohdsi.org/search-terms/terms/

classes:
  CDMProfiles:
    description: >
      A collection of OMOP CDM profiles describing the permissible semantic structures for populating the CDM.
    slots:
      - profiles
    tree_root: true
  OmopCdmProfile:
    description: >
      A compositional profile describing how a particular clinical endpoint is represented in the CDM. 
      This defines where concepts and values for a particular endpoint (e.g. blood pressure measurement)
      are represented in a particular CDM table (e.g. observation/value_as_number, measurement/measurement_concept_id).
    slots:
      - name
      - cdm_table
      - concept_slot
      - value_slot
slots:
  profiles:
    range: OmopCdmProfile
    multivalued: true
  cdm_table:
    range: CdmTable
    required: true
  concept_slot:
    range: string
    required: true
  value_slot:
    range: string
    required: false
enums:
  CdmTable:
    description: OMOP CDM table to which a semantic template applies
    permissible_values:
      observation:
      measurement:
      drug_exposure:
      procedure_occurrence:
      condition_occurrence:
      visit_occurrence:
      device_exposure:
      specimen: