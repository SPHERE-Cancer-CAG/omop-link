id: https://athena.ohdsi.org/search-terms/terms/omop_named_sets
name: omop_named_sets

imports:
  - omop_semantic_base

prefixes:
  linkml: https://w3id.org/linkml/
  omop: https://athena.ohdsi.org/search-terms/terms/

classes:
  CDMValueSets:
    slots:
      - valuesets
    description: >
      A collection of value sets used for defining permissible values for template slots in the OMOP CDM.
  CDMValueSet:
    description: >
      A labelled value set defining a set of permissible values for a particular template slot in the OMOP CDM.
      This is the grouper class through which you may bring together a combination of lower level semantic objects
      (individual concepts, hierarchical groups, or enumerations) to span the set of permissible values for a template slot.
    slots:
      - valueset_name
      - valueset_members
  CDMSemanticUnits:
    description: >
      A collection of named semantic units used for defining permissible values for template slots in the OMOP CDM.
      This is intended to be used as a registry of labelled units that can be referenced in template definitions.
    slots:
      - name
      - named_enumerators
      - named_concepts
      - named_groups
slots:
  named_enumerators:
    range: OmopEnum
    multivalued: true
    required: false
  named_concepts:
    range: OmopConcept
    multivalued: true
    required: false
  named_valuesets:
    range: OmopValueSet
    multivalued: true
    required: false
  named_groups:
    range: OmopGroup
    multivalued: true
    required: false
  valueset_name:
    range: string
    required: true
  valueset_members:
    range: OmopSemanticObject
    multivalued: true
    required: true
  valuesets:
    range: CDMValueSet
    multivalued: true
    required: true